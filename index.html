<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Etch-A-Sketch</title>
    <link rel="icon" type="image/x-icon" href="pencil.ico">
    <script src="script.js" type="module"></script>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <header>
        <h1>Etch-A-Sketch</h1>
    </header>
    <main>
        <div class="grid"></div>
        <div class="controls">
            <label id="size-label" for="size-slider">16 x 16</label>
            <input id="size-slider" type="range" value="16" min="1" max="100">
        </div>
    </main>
</body>

</html>
